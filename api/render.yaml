services:
  - type: web
    name: velib-wizard-api
    runtime: python
    plan: free
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.1
      - key: VELIB_RUN_SCHEDULER
        value: "0"
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000
      - key: GBFS_BASE
        value: https://velib-metropole-opendata.smovengo.cloud/opendata/Velib_Metropole
      - key: DATABASE_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: ALERT_TO
        sync: false
